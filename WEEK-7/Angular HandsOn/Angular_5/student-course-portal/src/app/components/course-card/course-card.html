<div class="card" [ngClass]="cardClasses" [ngStyle]="{ 'border-left-color': gradeColor }">
  <h3>{{ course.name }}</h3>

  <p><b>ID:</b> {{ course.id }}</p>

  <p><b>Code:</b> {{ course.code }}</p>

  <p><b>Credits:</b> {{ course.credits | creditLabel }}</p>

  <div class="badge" [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge failed">Failed</span>
    <span *ngSwitchDefault class="badge pending">Pending</span>
  </div>

  <button type="button" (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <p *ngIf="isExpanded" class="details">
    {{ course.name }} has {{ course.gradeStatus ?? 'pending' }} status.
  </p>

  <button type="button" (click)="enrollRequested.emit(course.id)">
    Enroll
  </button>
</div>

<hr>
